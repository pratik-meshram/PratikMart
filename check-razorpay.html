<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razorpay Test</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button {
            background: #6c63ff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover { background: #5a52d5; }
        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🧪 Razorpay Integration Test</h1>
    
    <div id="status"></div>
    
    <h2>Step 1: Check Razorpay Script</h2>
    <button onclick="checkScript()">Check Script</button>
    
    <h2>Step 2: Test Backend Connection</h2>
    <button onclick="testBackend()">Test Backend</button>
    
    <h2>Step 3: Test Payment Flow</h2>
    <button onclick="testPayment()">Open Test Payment</button>
    
    <h2>Logs:</h2>
    <pre id="logs"></pre>

    <script>
        const API_URL = 'http://localhost:3000/api';
        
        function log(message, type = 'info') {
            const logsEl = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            logsEl.textContent += `[${timestamp}] ${message}\n`;
            
            const statusEl = document.getElementById('status');
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;
        }

        function checkScript() {
            if (typeof Razorpay !== 'undefined') {
                log('✅ Razorpay script loaded successfully!', 'success');
                console.log('Razorpay:', Razorpay);
            } else {
                log('❌ Razorpay script NOT loaded. Check internet connection.', 'error');
            }
        }

        async function testBackend() {
            try {
                log('Testing backend connection...', 'info');
                
                // Test 1: Get Razorpay key
                const keyResponse = await fetch(`${API_URL}/payment/key`);
                const keyData = await keyResponse.json();
                
                if (keyData.key) {
                    log(`✅ Backend connected! Key: ${keyData.key}`, 'success');
                } else {
                    log('❌ Backend returned no key', 'error');
                }
                
                // Test 2: Create test order
                const orderResponse = await fetch(`${API_URL}/payment/create-order`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer test-token' // You'll need real token
                    },
                    body: JSON.stringify({ amount: 100, currency: 'INR' })
                });
                
                if (orderResponse.ok) {
                    const orderData = await orderResponse.json();
                    log(`✅ Test order created: ${orderData.orderId}`, 'success');
                    console.log('Order data:', orderData);
                } else {
                    const error = await orderResponse.json();
                    log(`⚠️ Order creation needs authentication: ${error.message}`, 'info');
                }
                
            } catch (error) {
                log(`❌ Backend error: ${error.message}`, 'error');
                console.error('Backend test error:', error);
            }
        }

        async function testPayment() {
            if (typeof Razorpay === 'undefined') {
                log('❌ Razorpay not loaded. Click "Check Script" first.', 'error');
                return;
            }

            try {
                log('Opening test payment modal...', 'info');
                
                // Test with dummy data
                const options = {
                    key: 'rzp_test_xgEX35fP55p1Lk', // Your test key
                    amount: 10000, // 100 INR in paise
                    currency: 'INR',
                    name: 'PratikMart Test',
                    description: 'Test Payment',
                    handler: function (response) {
                        log('✅ Payment successful!', 'success');
                        console.log('Payment response:', response);
                        alert('Payment ID: ' + response.razorpay_payment_id);
                    },
                    prefill: {
                        name: 'Test User',
                        email: 'test@example.com',
                        contact: '9999999999'
                    },
                    theme: {
                        color: '#6c63ff'
                    },
                    modal: {
                        ondismiss: function() {
                            log('⚠️ Payment cancelled by user', 'info');
                        }
                    }
                };

                const razorpay = new Razorpay(options);
                
                razorpay.on('payment.failed', function (response) {
                    log('❌ Payment failed: ' + response.error.description, 'error');
                    console.error('Payment error:', response.error);
                });

                razorpay.open();
                log('✅ Razorpay modal opened!', 'success');
                
            } catch (error) {
                log(`❌ Error opening payment: ${error.message}`, 'error');
                console.error('Payment test error:', error);
            }
        }

        // Auto-check on load
        window.onload = function() {
            log('Page loaded. Click buttons to test.', 'info');
            setTimeout(checkScript, 500);
        };
    </script>
</body>
</html>
